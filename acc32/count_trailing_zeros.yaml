limit: 1000
memory_size: 0xFF
memory_mapped_io:
  0x80: [8]
  0x84: []
reports:
  - name: Step-by-step
    slice: all
    view: |
      counter: {memory:0:3}
      Accumulator: {Acc:hex}
      {pc}:	{instruction}	{pc:label}

  - name: Result
    slice: last
    view: |
      answer: {io:0x84:dec}
      mem: {memory:0:90}
    assert: |
      answer: [] >>> [3]